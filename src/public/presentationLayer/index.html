<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Infocontexto | GYM-2025-19</title>
  <link rel="icon" type="image/png" href="assets/FavICO.png">
  <link rel="shortcut icon" href="assets/favicon.ico">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/presentation.css">
</head>
<body>
  <main class="presentation-shell">
    <header class="presentation-topbar">
      <div class="brand-lockup">
        <img src="assets/Colegio_Ciencias_Economicas.png" alt="Colegio de Ciencias Económicas" class="brand-logo">
        <div>
          <div class="brand-kicker">CCECR • Mi Colegio</div>
          <div class="brand-title">Sistema de Gestión del Gimnasio</div>
        </div>
      </div>
      <div class="timer-panel visually-hidden" aria-label="Tiempo de presentación">
        <span id="pageName">Presentación</span>
        <strong id="pageClock">00:00</strong>
      </div>
    </header>

    <section class="page-stage" aria-live="polite">
      <aside class="page-rail" id="pageRail" aria-label="Páginas de la presentación"></aside>
      <section class="slide-viewport">
        <div id="slideMount" class="slide-mount"></div>
      </section>
    </section>

    <footer class="presentation-footer">
      <div class="progress-stack">
        <div class="progress-labels">
          <span id="slideLabel">Slide 1 de 1</span>
          <span id="totalClock" class="visually-hidden">00:00 / 07:00</span>
        </div>
        <div class="progress presentation-progress" role="progressbar" aria-label="Avance de la página">
          <div id="pageProgress" class="progress-bar"></div>
        </div>
        <div class="progress slide-progress" role="progressbar" aria-label="Avance del slide">
          <div id="slideProgress" class="progress-bar"></div>
        </div>
      </div>
    </footer>

    <div id="slideWarning" class="slide-warning" aria-hidden="true">
      <span class="arrow-icon">→</span>
    </div>
  </main>

  <div class="modal fade" id="configModal" tabindex="-1" aria-labelledby="configModalTitle" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
      <div class="modal-content config-modal">
        <div class="modal-header">
          <div>
            <p class="modal-kicker mb-1">Configuración de tiempos</p>
            <h1 class="modal-title fs-4" id="configModalTitle">Preparar presentación</h1>
          </div>
        </div>
        <div class="modal-body">
          <div class="config-summary">
            <label for="totalMinutes" class="form-label">Tiempo total de la presentación</label>
            <div class="input-group">
              <input id="totalMinutes" class="form-control" type="number" min="1" step="1" value="7">
              <span class="input-group-text">minutos</span>
            </div>
            <div class="form-text">El total debe coincidir con la suma de los tiempos de las páginas.</div>
          </div>

          <div id="configError" class="alert alert-danger d-none mt-3" role="alert"></div>
          <div id="configPages" class="config-pages mt-3"></div>
        </div>
        <div class="modal-footer">
          <button id="startPresentation" type="button" class="btn btn-primary btn-lg">
            Iniciar presentación
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
